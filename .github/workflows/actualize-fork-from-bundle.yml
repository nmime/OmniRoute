name: Actualize fork from deployment bundle

on:
  push:
    branches:
      - automation/actualize-fork-v3.8.2-20260522T053919Z

permissions:
  contents: write

jobs:
  actualize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
      BUNDLE_URL: https://splox.s3.amazonaws.com/11d13cc6-5a21-4d99-a5cf-84b5e99b4ee9_omniroute-fork-sync-20260522T053919Z.bundle
      BUNDLE_REF: refs/heads/sync/fork-main-actualized-v3.8.2-20260522T053919Z
      SYNC_SHA: 613d16351dc3c6bbb13b21b4856ac85032d955b6
      EXPECTED_MAIN_SHA: 7b498b71063ad5c9767d136ea36934d2853873af
      TARGET_BRANCH: sync/fork-main-actualized-v3.8.2-20260522T053919Z
    steps:
      - name: Import deployed commit and fast-forward fork main
        shell: bash
        run: |
          set -euo pipefail
          git init work
          cd work
          git config --global --add safe.directory "$PWD"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          current_main="$(git rev-parse refs/remotes/origin/main)"
          echo "current_main=${current_main}"
          if [ "${current_main}" != "${EXPECTED_MAIN_SHA}" ]; then
            echo "::error::main moved unexpectedly (${current_main}); expected ${EXPECTED_MAIN_SHA}. Aborting to avoid overwrite."
            exit 10
          fi
          curl -fsSL "${BUNDLE_URL}" -o /tmp/omniroute-fork-sync.bundle
          git bundle verify /tmp/omniroute-fork-sync.bundle
          git fetch /tmp/omniroute-fork-sync.bundle "${BUNDLE_REF}:refs/remotes/bundle/fork-sync"
          imported="$(git rev-parse refs/remotes/bundle/fork-sync)"
          echo "imported=${imported}"
          if [ "${imported}" != "${SYNC_SHA}" ]; then
            echo "::error::bundle imported ${imported}; expected ${SYNC_SHA}."
            exit 11
          fi
          if ! git merge-base --is-ancestor refs/remotes/origin/main "${SYNC_SHA}"; then
            echo "::error::sync commit is not a fast-forward from current main."
            exit 12
          fi
          git push origin "${SYNC_SHA}:refs/heads/${TARGET_BRANCH}"
          git push origin "${SYNC_SHA}:refs/heads/main"
          echo "Fork actualized: main=${SYNC_SHA}; branch=${TARGET_BRANCH}"
      - name: Remove temporary automation branch
        if: ${{ success() }}
        shell: bash
        run: |
          git init cleanup
          cd cleanup
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          git push origin --delete "${GITHUB_REF_NAME}" || true
